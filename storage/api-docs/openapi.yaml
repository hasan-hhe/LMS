openapi: 3.0.3
info:
  title: LMS App API
  description: |
    API documentation for the Library Management System mobile/web app.

    **Authentication:** Use a Bearer Token (Laravel Sanctum) for protected routes.
    Obtain a token via `POST /api/v1/auth/login`.
  version: 1.0.0
  contact:
    name: LMS Backend

servers:
  - url: /api
    description: Local server

tags:
  - name: Authentication
    description: Login and logout
  - name: Members
    description: Member management (requires LIBRARIAN role)

paths:
  /v1/auth/login:
    post:
      tags: [Authentication]
      summary: Login
      description: Authenticate with email, phone, and password. Returns user data and access token.
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: ahmed@example.com
              phone: "0912345678"
              password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                user:
                  id: 1
                  first_name: Ahmad
                  last_name: Mohammad
                  full_name: Ahmad Mohammad
                  email: ahmed@example.com
                  phone: "0912345678"
                  identity_number: "1234567890"
                  adress: Damascus
                  role: MEMBER
                  photo_url: null
                  participe_end_date: null
                  created_at: "2026-06-07 10:00:00"
                token: "1|xxxxxxxx"
                body: Login successful
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppAuthErrorResponse'
              examples:
                wrongPassword:
                  value:
                    status: error
                    body: Incorrect password
                emailNotFound:
                  value:
                    status: error
                    body: Email not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppAuthErrorResponse'

  /v1/auth/logout:
    post:
      tags: [Authentication]
      summary: Logout
      description: Revoke all tokens for the authenticated user.
      operationId: authLogout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
              example:
                body: Logout successful
        '401':
          $ref: '#/components/responses/Unauthorized'

  /member/register:
    post:
      tags: [Members]
      summary: Register a new member
      description: |
        Create a new MEMBER account. **Requires:** valid token + LIBRARIAN role.
      operationId: memberRegister
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterMemberRequest'
      responses:
        '201':
          description: Member created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberForbiddenResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberErrorResponse'

  /member/get-members:
    get:
      tags: [Members]
      summary: List all members
      description: |
        Returns all users with the MEMBER role.
        **Requires:** valid token + LIBRARIAN role.
      operationId: memberGetMembers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Members retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberForbiddenResponse'

  /member/get/{id}:
    get:
      tags: [Members]
      summary: Get member by ID
      description: |
        Retrieve a specific member's profile.
        **Requires:** valid token + LIBRARIAN role.
      operationId: memberGetById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MemberId'
      responses:
        '200':
          description: Member found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberForbiddenResponse'
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberErrorResponse'
              example:
                status: error
                body: User not found

  /member/update-member/{id}:
    put:
      tags: [Members]
      summary: Update member
      description: |
        Update an existing member. All fields are optional.
        **Requires:** valid token + LIBRARIAN role.
      operationId: memberUpdate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MemberId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateMemberRequest'
      responses:
        '200':
          description: Member updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberForbiddenResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberErrorResponse'

  /member/control-state/{id}:
    post:
      tags: [Members]
      summary: Change member account state
      description: |
        Activate, pause, or cancel a member account.
        **Requires:** valid token + LIBRARIAN role.
      operationId: memberControlState
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ControlStateRequest'
            example:
              state: ACTIVE
      responses:
        '200':
          description: Account state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberMessageResponse'
              example:
                body: Account state changed successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberForbiddenResponse'
        '422':
          description: Invalid state value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberErrorResponse'

  /member/update-participe-date/{id}:
    patch:
      tags: [Members]
      summary: Update membership expiry date
      description: |
        Update a member's subscription end date.
        **Requires:** valid token + LIBRARIAN role.
      operationId: memberUpdateParticipeDate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParticipeDateRequest'
            example:
              participe_end_date: "2027-12-31"
      responses:
        '200':
          description: Membership date updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberForbiddenResponse'
        '422':
          description: Invalid date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum Token
      description: Enter the token only (Swagger adds the Bearer prefix automatically)

  parameters:
    MemberId:
      name: id
      in: path
      required: true
      description: Member ID
      schema:
        type: integer
        example: 5

  responses:
    Unauthorized:
      description: Unauthorized — missing or invalid token
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Unauthenticated.

  schemas:
    LoginRequest:
      type: object
      required: [email, phone, password]
      properties:
        email:
          type: string
          format: email
          example: ahmed@example.com
        phone:
          type: string
          pattern: '^[0-9]+$'
          example: "0912345678"
        password:
          type: string
          format: password
          example: password123

    RegisterRequest:
      type: object
      required:
        - first_name
        - last_name
        - email
        - phone
        - identity_number
        - password
      properties:
        first_name:
          type: string
          example: Ahmad
        last_name:
          type: string
          example: Mohammad
        email:
          type: string
          format: email
          example: ahmed@example.com
        phone:
          type: string
          pattern: '^[0-9]+$'
          example: "0912345678"
        identity_number:
          type: string
          pattern: '^[0-9]+$'
          example: "1234567890"
        password:
          type: string
          format: password
          minLength: 6
          example: password123
        adress:
          type: string
          nullable: true
          example: Damascus
        photo_image:
          type: string
          format: binary
          description: Profile photo (png, jpg, gif)

    RegisterMemberRequest:
      type: object
      required:
        - first_name
        - last_name
        - email
        - phone
        - identity_number
        - password
        - password_confirmation
      properties:
        first_name:
          type: string
          example: Ahmad
        last_name:
          type: string
          example: Mohammad
        email:
          type: string
          format: email
          example: ahmed@example.com
        phone:
          type: string
          pattern: '^[0-9]+$'
          example: "0912345678"
        identity_number:
          type: string
          pattern: '^[0-9]+$'
          example: "1234567890"
        password:
          type: string
          format: password
          minLength: 8
          example: password123
        password_confirmation:
          type: string
          format: password
          example: password123
        adress:
          type: string
          nullable: true
          example: Damascus
        participe_end_date:
          type: string
          format: date
          nullable: true
          example: "2027-12-31"
        photo_image:
          type: string
          format: binary
          description: Profile photo (png, jpg, gif)

    UpdateMemberRequest:
      type: object
      properties:
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          pattern: '^[0-9]+$'
          nullable: true
        identity_number:
          type: string
          pattern: '^[0-9]+$'
          nullable: true
        password:
          type: string
          format: password
          minLength: 6
          nullable: true
        adress:
          type: string
          nullable: true
        participe_end_date:
          type: string
          format: date
          nullable: true
        photo_image:
          type: string
          format: binary
          description: Profile photo (png, jpg, gif)

    ControlStateRequest:
      type: object
      required: [state]
      properties:
        state:
          type: string
          enum: [ACTIVE, PAUSED, CANCLED]
          description: Member account state
          example: ACTIVE

    UpdateParticipeDateRequest:
      type: object
      required: [participe_end_date]
      properties:
        participe_end_date:
          type: string
          format: date
          example: "2027-12-31"

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          example: Ahmad
        last_name:
          type: string
          example: Mohammad
        full_name:
          type: string
          example: Ahmad Mohammad
        email:
          type: string
          format: email
          example: ahmed@example.com
        phone:
          type: string
          example: "0912345678"
        identity_number:
          type: string
          example: "1234567890"
        adress:
          type: string
          nullable: true
          example: Damascus
        role:
          type: string
          enum: [MEMBER, LIBRARIAN, ADMIN]
          example: MEMBER
        photo_url:
          type: string
          format: uri
          nullable: true
          example: "http://localhost/storage/Profiles/photo.jpg"
        participe_end_date:
          type: string
          format: date
          nullable: true
          example: "2027-12-31"
        created_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-07 10:00:00"

    RegisterResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        body:
          type: string
          example: Account registered successfully

    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          example: "1|xxxxxxxxxxxxxxxx"
        body:
          type: string
          example: Login successful

    LogoutResponse:
      type: object
      properties:
        body:
          type: string
          example: Logout successful

    AppAuthErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum: [error]
        body:
          type: string
          example: Validation error message

    MemberSingleResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        body:
          type: string
          example: Member updated successfully

    MemberListResponse:
      type: object
      properties:
        user:
          type: array
          items:
            $ref: '#/components/schemas/User'

    MemberMessageResponse:
      type: object
      properties:
        body:
          type: string

    MemberForbiddenResponse:
      type: object
      properties:
        body:
          type: string
          example: You do not have permission to perform this action

    MemberErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum: [error]
        body:
          type: string
